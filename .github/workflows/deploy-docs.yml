name: Deploy Docs to GitHub Pages

on:
  push:
    branches: [main, master, "0.*"]
    paths:
      - "packages/docs/**"
      - "packages/example/**"
      - "packages/core/**"
      - ".github/workflows/deploy-docs.yml"
  workflow_dispatch:
    inputs:
      api_base_url:
        description: "Backend API URL, for example https://api.your-domain.com"
        required: false
        default: ""

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Core
        run: pnpm --filter @file-ud.js/core build

      - name: Prepare docs version metadata
        id: docs
        shell: bash
        run: |
          VERSION="v$(node -p "require('./packages/core/package.json').version")"

          git fetch origin gh-pages:refs/remotes/origin/gh-pages --depth=1 || true
          EXISTING_VERSIONS=$(
            git ls-tree -d --name-only origin/gh-pages 2>/dev/null \
              | grep -E '^v[0-9]+' \
              || true
          )
          if printf "%s\n" "$EXISTING_VERSIONS" | grep -qx "$VERSION"; then
            VERSION_EXISTS="true"
          else
            VERSION_EXISTS="false"
          fi
          VERSIONS=$(
            printf "%s\n%s\n" "$VERSION" "$EXISTING_VERSIONS" \
              | sed '/^$/d' \
              | sort -Vr \
              | awk '!seen[$0]++' \
              | paste -sd, -
          )

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "version_exists=$VERSION_EXISTS" >> "$GITHUB_OUTPUT"
          echo "versions=$VERSIONS" >> "$GITHUB_OUTPUT"
          echo "latest_path=/file-ud.js/" >> "$GITHUB_OUTPUT"
          echo "version_path=/file-ud.js/${VERSION}/" >> "$GITHUB_OUTPUT"

      - name: Build versioned docs
        if: steps.docs.outputs.version_exists != 'true'
        env:
          VITE_API_BASE_URL: ${{ github.event.inputs.api_base_url || secrets.VITE_API_BASE_URL || '' }}
          VITE_BASE_PATH: ${{ steps.docs.outputs.version_path }}
          VITE_DOC_LATEST_PATH: ${{ steps.docs.outputs.latest_path }}
          VITE_DOC_VERSION: ${{ steps.docs.outputs.version }}
          VITE_DOC_VERSIONS: ${{ steps.docs.outputs.versions }}
        run: pnpm --filter @file-ud.js/docs build

      - name: Deploy versioned docs
        if: steps.docs.outputs.version_exists != 'true'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: packages/docs/.vitepress/dist
          publish_branch: gh-pages
          destination_dir: ${{ steps.docs.outputs.version }}
          keep_files: true
          commit_message: "docs: deploy ${{ steps.docs.outputs.version }} docs"

      - name: Build latest docs
        if: github.ref_name == 'main' || github.ref_name == 'master'
        env:
          VITE_API_BASE_URL: ${{ github.event.inputs.api_base_url || secrets.VITE_API_BASE_URL || '' }}
          VITE_BASE_PATH: ${{ steps.docs.outputs.latest_path }}
          VITE_DOC_LATEST_PATH: ${{ steps.docs.outputs.latest_path }}
          VITE_DOC_VERSION: ${{ steps.docs.outputs.version }}
          VITE_DOC_VERSIONS: ${{ steps.docs.outputs.versions }}
        run: pnpm --filter @file-ud.js/docs build

      - name: Deploy latest docs
        if: github.ref_name == 'main' || github.ref_name == 'master'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: packages/docs/.vitepress/dist
          publish_branch: gh-pages
          keep_files: true
          commit_message: "docs: deploy latest docs"
