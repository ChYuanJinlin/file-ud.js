name: Release

on:
  push:
    paths:
      - ".changeset/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "packages/**/package.json"
      - ".github/workflows/release.yml"
    branches:
      - master
      - main
      - "0.*"
  workflow_dispatch:

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test packages
        run: pnpm test

      - name: Build packages
        run: pnpm build

      # 🔑 检查是否有 changeset 文件 → 创建 Version Packages PR
      - name: Create Release Pull Request or Publish
        id: changesets
        uses: changesets/action@v1
        with:
          title: "ci: version packages"
          commit: "ci: version packages"
          publish: pnpm release
          version: pnpm version-packages
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create aggregate GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          CORE_VERSION=$(node -p "require('./packages/core/package.json').version")
          PLUGINS_VERSION=$(node -p "require('./packages/plugins/package.json').version")
          TAG="v${CORE_VERSION}"
          TITLE="@file-ud.js ${TAG}"

          {
            echo "## @file-ud.js ${TAG}"
            echo
            echo "Browser file upload and download SDK for TypeScript/JavaScript."
            echo
            echo "### Packages"
            echo
            echo "- @file-ud.js/core@${CORE_VERSION}"
            echo "- @file-ud.js/plugins@${PLUGINS_VERSION}"
            echo
            echo "### Documentation"
            echo
            echo "- https://chyuanjinlin.github.io/file-ud.js/"
            echo "- https://chyuanjinlin.github.io/file-ud.js/v${CORE_VERSION}/"
          } > release-notes.md

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --title "$TITLE" --notes-file release-notes.md --latest
          else
            gh release create "$TAG" --target "$GITHUB_SHA" --title "$TITLE" --notes-file release-notes.md --latest
          fi
